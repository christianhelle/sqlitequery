name: Build MacOS Template

on:
  workflow_call:
    inputs:
      version:
        description: 'Version number for the build'
        required: true
        type: string
      os:
        description: build agent
        required: true
        type: string
      architecture:
        description: cpu architecture
        required: true
        type: string

jobs:
  template:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Update Version Number (Qt Project)
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $version = (Get-Content -Path src/project/SQLiteAnalyzer.pro -Raw) -replace 'VERSION = 1.0.0', "VERSION = $env:VERSION"
          $version | Set-Content -Path src/project/SQLiteAnalyzer.pro

      - name: Update Version in code
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $version = (Get-Content -Path src/main.cpp -Raw) -replace 'constexpr auto Version = "1.0.0";', "constexpr auto Version = `"$env:VERSION`";"
          $version | Set-Content -Path src/main.cpp

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'

      - name: QMake
        run: qmake
        working-directory: src/project

      - name: Make
        run: make -j 32
        working-directory: src/project

      - name: macdeployqt
        working-directory: src/project
        run: macdeployqt SQLiteQueryAnalyzer.app -dmg -appstore-compliant

      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SQLiteQuerAnalyzer_MacOS_v${{ inputs.version }}_${{ inputs.architecture }}
          path: |
            src/project/SQLiteQueryAnalyzer.dmg
